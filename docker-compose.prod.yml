# Docker Compose produccion (Docker Swarm) — ASME Extractor v2.1.
# - Finalidad: Define servicio backend con Traefik (HTTPS/letsencrypt) y Docker secrets.
#   Incluye secret asme_api_key para autenticacion de requests.
# - Consume: asme-backend:latest (imagen), secrets de Docker Swarm, dokploy-network
# - Consumido por: docker stack deploy (envsubst < este archivo)

services:
  backend:
    image: asme-backend:latest
    environment:
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      PDF_DPI: ${PDF_DPI:-200}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      GLIDE_APP_ID: ${GLIDE_APP_ID}
    secrets:
      - openai_api_key
      - glide_api_token
      - asme_api_key
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.asme.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.asme.entrypoints=websecure"
        - "traefik.http.routers.asme.tls.certresolver=letsencrypt"
        - "traefik.http.routers.asme-http.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.asme-http.entrypoints=web"
        - "traefik.http.services.asme.loadbalancer.server.port=8000"
        - "traefik.docker.network=dokploy-network"
    networks:
      - dokploy-network

secrets:
  openai_api_key:
    external: true
  glide_api_token:
    external: true
  asme_api_key:
    external: true

networks:
  dokploy-network:
    external: true
