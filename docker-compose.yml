services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      PDF_DPI: ${PDF_DPI:-200}
      GLIDE_APP_ID: ${GLIDE_APP_ID}
      GLIDE_API_TOKEN: ${GLIDE_API_TOKEN}
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
